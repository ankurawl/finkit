name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Beancount v3 from source
        run: |
          pip install git+https://github.com/beancount/beancount.git
          pip install git+https://github.com/beancount/beanquery.git
          pip install git+https://github.com/beancount/beangulp.git

      - name: Install package with dev dependencies
        run: pip install -e ".[market,dev]"

      - name: Run tests
        run: pytest -v
